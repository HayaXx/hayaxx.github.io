<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Local Image Viewer (GitHub Pages)</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    img { width: 200px; margin: 10px; display: block; }
    .card { display: inline-block; margin: 10px; }
  </style>
</head>
<body>

<h2>Upload & Download Image (Local Only)</h2>
<input type="file" id="fileInput" multiple>

<div id="gallery"></div>

<script>
const gallery = document.getElementById('gallery');

// Load from localStorage
function loadImages() {
  gallery.innerHTML = '';
  const images = JSON.parse(localStorage.getItem('images') || '[]');

  images.forEach((imgData, index) => {
    const div = document.createElement('div');
    div.className = 'card';

    const img = document.createElement('img');
    img.src = imgData;

    const download = document.createElement('a');
    download.href = imgData;
    download.download = 'image_' + index + '.png';
    download.innerText = 'Download';

    div.appendChild(img);
    div.appendChild(download);
    gallery.appendChild(div);
  });
}

// Upload handler
document.getElementById('fileInput').addEventListener('change', function(e) {
  const files = e.target.files;
  const readerPromises = [];

  for (let file of files) {
    const reader = new FileReader();
    readerPromises.push(new Promise(resolve => {
      reader.onload = () => resolve(reader.result);
      reader.readAsDataURL(file);
    }));
  }

  Promise.all(readerPromises).then(results => {
    const existing = JSON.parse(localStorage.getItem('images') || '[]');
    const updated = existing.concat(results);
    localStorage.setItem('images', JSON.stringify(updated));
    loadImages();
  });
});

loadImages();
</script>

</body>
</html>
