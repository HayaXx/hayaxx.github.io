<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cloud Image Upload (Online Storage)</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    img { width: 200px; margin: 10px; display: block; }
    .card { display: inline-block; margin: 10px; }
  </style>
</head>
<body>

<h2>Upload & Download Image (Cloudinary)</h2>
<input type="file" id="fileInput" multiple>

<div id="gallery"></div>

<script>
// ===== CONFIG (GANTI INI) =====
const CLOUD_NAME = "drpeacl6pE";
const UPLOAD_PRESET = "JkQgW5eZG7s1d8SfgqX2nwpV-9g";

const gallery = document.getElementById('gallery');

// Load images from localStorage (list URL)
function loadImages() {
  gallery.innerHTML = '';
  const images = JSON.parse(localStorage.getItem('images') || '[]');

  images.forEach((url, index) => {
    const div = document.createElement('div');
    div.className = 'card';

    const img = document.createElement('img');
    img.src = url;

    const download = document.createElement('a');
    download.href = url;
    download.target = "_blank";
    download.innerText = 'Download';

    div.appendChild(img);
    div.appendChild(download);
    gallery.appendChild(div);
  });
}

// Upload handler
async function uploadToCloudinary(file) {
  const url = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", UPLOAD_PRESET);

  const res = await fetch(url, {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  return data.secure_url;
}

// Handle file input
document.getElementById('fileInput').addEventListener('change', async function(e) {
  const files = e.target.files;
  const existing = JSON.parse(localStorage.getItem('images') || '[]');

  for (let file of files) {
    const imageUrl = await uploadToCloudinary(file);
    existing.push(imageUrl);
  }

  localStorage.setItem('images', JSON.stringify(existing));
  loadImages();
});

loadImages();
</script>

</body>
</html>
