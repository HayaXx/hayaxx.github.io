<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Global Image Sharing</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    img { width: 200px; margin: 10px; display: block; }
    .card { display: inline-block; margin: 10px; }
  </style>
</head>
<body>

<h2>🌍 Global Image Upload & Download</h2>
<input type="file" id="fileInput" multiple>

<div id="gallery"></div>

<script>
// ===== CONFIG =====
const CLOUD_NAME = "drpeacl6p";
const UPLOAD_PRESET = "newewew";

// ===== PUBLIC IMAGE LIST (shared via JSONBin API) =====
const API_URL = "https://api.jsonbin.io/v3/b/69bc4ae2aa77b81da9fd777d"; // GANTI nanti
const API_KEY = "$2a$10$FBlS5ykRnxuwoNus0HLSneTBdfO7nuVVidNELmZ59NHhQxEy3Iru."; // GANTI nanti

const gallery = document.getElementById('gallery');

// Render images
function renderImages(images) {
  gallery.innerHTML = '';

  images.forEach((url) => {
    const div = document.createElement('div');
    div.className = 'card';

    const img = document.createElement('img');
    img.src = url;

    const download = document.createElement('a');
    download.href = url;
    download.target = "_blank";
    download.innerText = 'Download';

    div.appendChild(img);
    div.appendChild(download);
    gallery.appendChild(div);
  });
}

// Fetch global images
async function fetchImages() {
  try {
    const res = await fetch(API_URL, {
      headers: { "X-Master-Key": API_KEY }
    });
    const data = await res.json();
    return data.record.images || [];
  } catch {
    return [];
  }
}

// Save global images
async function saveImages(images) {
  await fetch(API_URL, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": API_KEY
    },
    body: JSON.stringify({ images })
  });
}

// Upload to Cloudinary
async function uploadToCloudinary(file) {
  const url = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", UPLOAD_PRESET);

  const res = await fetch(url, {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  return data.secure_url;
}

// Handle upload
async function handleUpload(e) {
  const files = e.target.files;

  let images = await fetchImages();

  for (let file of files) {
    const url = await uploadToCloudinary(file);
    images.unshift(url); // tambah ke depan
  }

  await saveImages(images);
  renderImages(images);
}

// Init
async function init() {
  const images = await fetchImages();
  renderImages(images);
}

// Event
document.getElementById('fileInput').addEventListener('change', handleUpload);

init();
</script>

</body>
</html>
